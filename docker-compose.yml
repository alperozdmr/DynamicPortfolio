services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portfolio_db
    # BUG FIX: Bu satır olmadan SQL Server container'ı başlatılamıyordu.
    # Docker volume'una yazma izni olmadığı için mssql kullanıcısı /var/opt/mssql/data dizinine
    # yazamıyordu ve container crash oluyordu.
    # Hata: "Error setting up the staging directories... Permission denied"
    # Çözüm: user: root eklenerek volume'a yazma izni sağlandı.
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Password123!\" -C -Q \"SELECT 1\" > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  portfolio.ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_ui
    image: portfolioui
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=PortfoliDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;
      - Seed__Enabled=true
      - Seed__AdminRole=Admin
      - Seed__AdminEmail=admin@yourdomain.com
      - Seed__AdminUserName=admin
      - Seed__AdminPassword=Password123!
      # BUG FIX: Bu iki değişken önceden yoktu. AppUser entity'sinde Name ve Surname
      # alanları NOT NULL olarak tanımlı olduğu için seed sırasında bu değerler
      # sağlanmadığında DbUpdateException fırlatılıyordu:
      # "Cannot insert the value NULL into column 'Name'"
      # Çözüm: Seed__AdminName ve Seed__AdminSurname environment variable'ı eklendi.
      - Seed__AdminName=Admin
      - Seed__AdminSurname=User
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # portfolio.api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.api
  #   container_name: portfolio_api
  #   image: portfolioapi
  #   ports:
  #     - "5001:80"
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Production
  #     - ConnectionStrings__DefaultConnection=Server=db;Database=PortfoliDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     portfolio.ui:
  #       condition: service_started
  #   restart: on-failure

volumes:
  sql_data:
    name: sql_portfolio_data
