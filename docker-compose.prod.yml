version: '3.8'

services:
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: neon-local-proxy
    env_file:
      - .env.production
    ports:
      - "5432:5432"
    volumes:
      # Burada "./.neon_local/" yerine named volume (neon_local_data) kullanıyoruz ki çalışsın:
      - ./.git/HEAD:/tmp/.git/HEAD:ro,consistent
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '5432', '-U', 'neon']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - portfolio_network

  portfolio.ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_ui
    image: portfolioui
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # NOT: Npgsql (PostgreSQL provider'ı) 'Channel Binding=Require;' parametresini desteklemediği için 
      # connection string'den çıkarılmıştır.
      # Neon-local proxy proxy'sine bağlanırken Neon'un kendi proxy credential'ları (neon:npg) kullanılır.
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Seed__Enabled=${SEED_ENABLED}
      - Seed__AdminRole=${SEED_ADMIN_ROLE}
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL}
      - Seed__AdminUserName=${SEED_ADMIN_USERNAME}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD}
      - Seed__AdminName=${SEED_ADMIN_NAME}
      - Seed__AdminSurname=${SEED_ADMIN_SURNAME}
    volumes:
      - portfolio_images:/app/wwwroot/ımage
    depends_on:
      neon-local:
        condition: service_healthy
    restart: on-failure
    networks:
      - portfolio_network

volumes:
  portfolio_images:
    name: portfolio_images

networks:
  portfolio_network:
    name: portfolio_network
    driver: bridge
