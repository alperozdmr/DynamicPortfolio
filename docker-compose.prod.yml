version: '3.8'

services:
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: neon-local-proxy
    env_file:
      - .env.development
    ports:
      - "5432:5432"
    volumes:
      # Burada "./.neon_local/" yerine named volume (neon_local_data) kullanıyoruz ki çalışsın:
      - ./.git/HEAD:/tmp/.git/HEAD:ro,consistent
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '5432', '-U', 'neon']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - portfolio_network

  portfolio.ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_ui
    image: portfolioui
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # NOT: Npgsql (PostgreSQL provider'ı) 'Channel Binding=Require;' parametresini desteklemediği için 
      # connection string'den çıkarılmıştır.
      # Neon-local proxy proxy'sine bağlanırken Neon'un kendi proxy credential'ları (neon:npg) kullanılır.
      - ConnectionStrings__DefaultConnection=Host=ep-ancient-forest-alhg7a37-pooler.c-3.eu-central-1.aws.neon.tech;Database=neondb;Username=neondb_owner;Password=npg_g5SRrM6fthzK;SSL Mode=VerifyFull;
      - Seed__Enabled=true
      - Seed__AdminRole=Admin
      - Seed__AdminEmail=admin@yourdomain.com
      - Seed__AdminUserName=admin
      - Seed__AdminPassword=Password123!
      - Seed__AdminName=Admin
      - Seed__AdminSurname=User
    volumes:
      - portfolio_images:/app/wwwroot/ımage
    depends_on:
      neon-local:
        condition: service_healthy
    restart: on-failure
    networks:
      - portfolio_network

volumes:
  portfolio_images:
    name: portfolio_images

networks:
  portfolio_network:
    name: portfolio_network
    driver: bridge
